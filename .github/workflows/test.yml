name: DSP tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure standalone DSP tests
        run: cmake -S . -B build -DAMOEBA_BUILD_EXTERNALS=OFF -DAMOEBA_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
